<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" aria-label="하늘과 시간 일러스트">
  <defs>
    <linearGradient id="sk-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#3A8FC0"/>
      <stop offset="0.55" stop-color="#8FCBEE"/>
      <stop offset="1"    stop-color="#C8E8F6"/>
    </linearGradient>
    <linearGradient id="sk-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5CB870"/>
      <stop offset="1" stop-color="#3F7D54"/>
    </linearGradient>
    <radialGradient id="sk-sun-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0"    stop-color="#FFE566" stop-opacity="1"/>
      <stop offset="0.55" stop-color="#FFD166" stop-opacity="0.6"/>
      <stop offset="1"    stop-color="#FFD166" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sk-moon-grad" cx="38%" cy="38%" r="62%">
      <stop offset="0" stop-color="#FFFCE8"/>
      <stop offset="1" stop-color="#D6CEAA"/>
    </radialGradient>
    <linearGradient id="sk-plane-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EEF2F8"/>
      <stop offset="1" stop-color="#C0CCE0"/>
    </linearGradient>
  </defs>

  <!-- 배경 레이어 -->
  <rect x="0" y="0" width="1600" height="760" fill="url(#sk-sky)"/>

  <!-- 배경 장식 구름 (비클릭) -->
  <g fill="#ffffff" opacity="0.35">
    <ellipse cx="530"  cy="320" rx="62" ry="21"/>
    <ellipse cx="572"  cy="310" rx="44" ry="17"/>
    <ellipse cx="1100" cy="420" rx="70" ry="23"/>
    <ellipse cx="1142" cy="409" rx="48" ry="18"/>
  </g>

  <!-- 지평선 / 땅 -->
  <rect x="0" y="760" width="1600" height="140" fill="url(#sk-ground)"/>
  <rect x="0" y="757" width="1600" height="8"   fill="#3A6A48"/>
  <!-- 잔디 줄기 -->
  <g stroke="#4A9A58" stroke-width="3" opacity="0.55">
    <line x1="430"  y1="760" x2="426"  y2="744"/>
    <line x1="450"  y1="760" x2="454"  y2="746"/>
    <line x1="810"  y1="760" x2="806"  y2="744"/>
    <line x1="830"  y1="760" x2="834"  y2="747"/>
    <line x1="1190" y1="760" x2="1186" y2="744"/>
    <line x1="1210" y1="760" x2="1214" y2="747"/>
  </g>

  <!-- 클릭 아이템 (data-hit 0~9)
       상단 U0~U4: hit 0,1,3,4,7
       하단 L0~L4: hit 2,5,6,8,9 -->

  <!-- 상단 밴드 -->

  <!-- hit 0: 해 U0 translate(50,120) pad 270x270 -->
  <g data-hit="0" transform="translate(50,120)">
    <rect class="hit-pad" x="0" y="0" width="270" height="270" fill="transparent"/>
    <circle cx="135" cy="130" r="108" fill="url(#sk-sun-glow)"/>
    <g stroke="#E8A800" stroke-width="5" stroke-linecap="round" opacity="0.9">
      <line x1="135" y1="18"  x2="135" y2="4"/>
      <line x1="135" y1="242" x2="135" y2="258"/>
      <line x1="18"  y1="130" x2="4"   y2="130"/>
      <line x1="252" y1="130" x2="266" y2="130"/>
      <line x1="48"  y1="43"  x2="37"  y2="32"/>
      <line x1="222" y1="43"  x2="233" y2="32"/>
      <line x1="48"  y1="217" x2="37"  y2="228"/>
      <line x1="222" y1="217" x2="233" y2="228"/>
    </g>
    <circle cx="135" cy="130" r="74" fill="#FFD166" stroke="#E8A800" stroke-width="5"/>
  </g>

  <!-- hit 1: 달 U1 translate(360,120) pad 250x270 -->
  <g data-hit="1" transform="translate(360,120)">
    <rect class="hit-pad" x="0" y="0" width="250" height="270" fill="transparent"/>
    <g fill="#FFE566" opacity="0.75">
      <circle cx="188" cy="38"  r="4"/>
      <circle cx="218" cy="82"  r="3"/>
      <circle cx="232" cy="148" r="3.5"/>
      <circle cx="204" cy="208" r="3"/>
      <circle cx="28"  cy="58"  r="3"/>
      <circle cx="16"  cy="110" r="2.5"/>
    </g>
    <circle cx="102" cy="134" r="88" fill="url(#sk-moon-grad)" stroke="#B8A870" stroke-width="4"/>
    <circle cx="140" cy="112" r="80" fill="#8FCBEE"/>
  </g>

  <!-- hit 3: 구름 U2 translate(660,120) pad 250x270 -->
  <g data-hit="3" transform="translate(660,120)">
    <rect class="hit-pad" x="0" y="0" width="250" height="270" fill="transparent"/>
    <g fill="#A8BCCE">
      <ellipse cx="125" cy="192" rx="110" ry="46"/>
      <ellipse cx="72"  cy="158" rx="60"  ry="52"/>
      <ellipse cx="128" cy="142" rx="74"  ry="64"/>
      <ellipse cx="188" cy="162" rx="54"  ry="46"/>
    </g>
    <g fill="#BED0E2">
      <ellipse cx="125" cy="186" rx="98" ry="38"/>
      <ellipse cx="74"  cy="152" rx="52" ry="44"/>
      <ellipse cx="128" cy="137" rx="64" ry="56"/>
      <ellipse cx="186" cy="157" rx="46" ry="40"/>
    </g>
  </g>

  <!-- hit 4: 비행기 U3 translate(960,120) pad 240x270 -->
  <g data-hit="4" transform="translate(960,120)">
    <rect class="hit-pad" x="0" y="0" width="240" height="270" fill="transparent"/>
    <line x1="20" y1="210" x2="210" y2="88" stroke="#ffffff" stroke-width="4" stroke-dasharray="12,8" opacity="0.65"/>
    <g transform="translate(120,138) rotate(-20)">
      <ellipse cx="0" cy="0" rx="82" ry="22" fill="url(#sk-plane-body)" stroke="#8899AA" stroke-width="3"/>
      <ellipse cx="82" cy="0" rx="20" ry="14" fill="#D0DCEA" stroke="#8899AA" stroke-width="2"/>
      <polygon points="-18,-23 42,-23 22,40 -28,40" fill="#C8D4E2" stroke="#8899AA" stroke-width="2"/>
      <polygon points="-82,-22 -52,-22 -56,0 -82,0" fill="#C8D4E2" stroke="#8899AA" stroke-width="2"/>
      <polygon points="-82,22 -52,22 -56,0 -82,0"   fill="#C8D4E2" stroke="#8899AA" stroke-width="2"/>
      <g fill="#A8D8EE">
        <rect x="-12" y="-11" width="16" height="12" rx="4"/>
        <rect x="12"  y="-11" width="16" height="12" rx="4"/>
        <rect x="36"  y="-11" width="16" height="12" rx="4"/>
      </g>
      <ellipse cx="10" cy="33" rx="14" ry="7" fill="#9AAAB8" stroke="#7A8A98" stroke-width="2"/>
    </g>
  </g>

  <!-- hit 7: 흰 구름 U4 translate(1250,120) pad 300x270 -->
  <g data-hit="7" transform="translate(1250,120)">
    <rect class="hit-pad" x="0" y="0" width="300" height="270" fill="transparent"/>
    <g fill="#ffffff">
      <ellipse cx="150" cy="196" rx="126" ry="48"/>
      <ellipse cx="88"  cy="160" rx="64"  ry="58"/>
      <ellipse cx="154" cy="142" rx="82"  ry="70"/>
      <ellipse cx="220" cy="164" rx="60"  ry="52"/>
      <ellipse cx="270" cy="190" rx="38"  ry="30"/>
      <ellipse cx="36"  cy="192" rx="36"  ry="28"/>
    </g>
    <g fill="#DCE8F4" opacity="0.55">
      <ellipse cx="150" cy="206" rx="116" ry="36"/>
      <ellipse cx="88"  cy="172" rx="54"  ry="40"/>
    </g>
  </g>

  <!-- 하단 밴드 -->

  <!-- hit 2: 연도 포스터 L0 translate(50,480) pad 270x360 -->
  <g data-hit="2" transform="translate(50,480)">
    <rect class="hit-pad" x="0" y="0" width="270" height="360" fill="transparent"/>
    <rect x="118" y="296" width="14" height="64" fill="#7A5B3A"/>
    <ellipse cx="125" cy="358" rx="42" ry="10" fill="#5A3F28"/>
    <rect x="8"  y="18" width="254" height="282" rx="14" fill="#1B5FA3" stroke="#0E3C6B" stroke-width="5"/>
    <rect x="8"  y="18" width="254" height="62"  rx="14" fill="#E63946"/>
    <rect x="8"  y="58" width="254" height="22"         fill="#E63946"/>
    <rect x="78"  y="8" width="18" height="24" rx="6" fill="#8A8A8A"/>
    <rect x="174" y="8" width="18" height="24" rx="6" fill="#8A8A8A"/>
    <text x="135" y="68"  text-anchor="middle" font-family="'Jua', sans-serif" font-size="28" fill="#ffffff">2026년</text>
    <text x="135" y="148" text-anchor="middle" font-family="'Jua', sans-serif" font-size="68" fill="#ffffff">2026</text>
    <line x1="28" y1="168" x2="242" y2="168" stroke="#3A7AD4" stroke-width="2"/>
    <g font-family="'Gowun Dodum', sans-serif" font-size="19" fill="#BFD8F4" text-anchor="middle">
      <text x="50"  y="198">월</text><text x="94"  y="198">화</text>
      <text x="138" y="198">수</text><text x="182" y="198">목</text><text x="226" y="198">금</text>
      <text x="50"  y="226">1</text><text x="94"  y="226">2</text>
      <text x="138" y="226">3</text><text x="182" y="226">4</text><text x="226" y="226">5</text>
      <text x="50"  y="252">8</text><text x="94"  y="252">9</text>
      <text x="138" y="252">10</text><text x="182" y="252">11</text><text x="226" y="252">12</text>
      <text x="50"  y="278">15</text><text x="94"  y="278">16</text>
      <text x="138" y="278">17</text><text x="182" y="278">18</text><text x="226" y="278">19</text>
    </g>
  </g>

  <!-- hit 5: 장남(맏아들) — 큰형 + 작은 동생 으로 '맏이' 표현  L1 translate(360,480) pad 250x360 -->
  <g data-hit="5" transform="translate(360,480)">
    <rect class="hit-pad" x="0" y="0" width="250" height="360" fill="transparent"/>
    <!-- 동생(작은 아이) — 뒤/오른쪽 -->
    <ellipse cx="182" cy="350" rx="17" ry="7" fill="#2D3047"/>
    <ellipse cx="212" cy="350" rx="17" ry="7" fill="#2D3047"/>
    <path d="M 186,302 L 182,346" stroke="#3A4A6A" stroke-width="15" stroke-linecap="round" fill="none"/>
    <path d="M 208,302 L 212,346" stroke="#3A4A6A" stroke-width="15" stroke-linecap="round" fill="none"/>
    <rect x="170" y="236" width="52" height="74" rx="16" fill="#FFD166"/>
    <path d="M 173,250 L 158,292" stroke="#F0C49B" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M 219,250 L 234,292" stroke="#F0C49B" stroke-width="12" stroke-linecap="round" fill="none"/>
    <circle cx="196" cy="200" r="29" fill="#F0C49B" stroke="#D4A070" stroke-width="2"/>
    <path d="M 169,196 A 29 29 0 0 1 223,196 L 223,188 A 29 29 0 0 0 169,188 Z" fill="#5A3A2A"/>
    <circle cx="187" cy="202" r="4" fill="#2D3047"/>
    <circle cx="206" cy="202" r="4" fill="#2D3047"/>
    <path d="M 188,213 Q 196,219 204,213" stroke="#2D3047" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- 장남(큰형) — 앞/왼쪽, 동생 어깨에 손 -->
    <ellipse cx="76"  cy="352" rx="22" ry="8" fill="#2D3047"/>
    <ellipse cx="116" cy="352" rx="22" ry="8" fill="#2D3047"/>
    <path d="M 84,242 L 76,348"  stroke="#2F4A6E" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M 112,242 L 120,348" stroke="#2F4A6E" stroke-width="22" stroke-linecap="round" fill="none"/>
    <rect x="58" y="152" width="84" height="104" rx="18" fill="#1B5FA3"/>
    <path d="M 62,168 L 40,240" stroke="#F0C49B" stroke-width="17" stroke-linecap="round" fill="none"/>
    <circle cx="38" cy="246" r="11" fill="#F0C49B"/>
    <path d="M 138,168 L 176,214" stroke="#F0C49B" stroke-width="17" stroke-linecap="round" fill="none"/>
    <circle cx="180" cy="218" r="11" fill="#F0C49B"/>
    <circle cx="100" cy="104" r="40" fill="#F0C49B" stroke="#D4A070" stroke-width="3"/>
    <path d="M 62,98 A 40 40 0 0 1 138,98 L 138,86 A 40 40 0 0 0 62,86 Z" fill="#3A2A1A"/>
    <circle cx="86"  cy="106" r="5" fill="#2D3047"/>
    <circle cx="114" cy="106" r="5" fill="#2D3047"/>
    <path d="M 88,124 Q 100,132 112,124" stroke="#2D3047" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text x="92" y="22" text-anchor="middle" font-family="'Gowun Dodum', sans-serif" font-size="22" fill="#2F4A6E">장남</text>
  </g>

  <!-- hit 6: 청년(젊은이) — 한 사람, 주먹 번쩍 든 활기찬 포즈  L2 translate(660,480) pad 250x360 -->
  <g data-hit="6" transform="translate(660,480)">
    <rect class="hit-pad" x="0" y="0" width="250" height="360" fill="transparent"/>
    <ellipse cx="100" cy="352" rx="22" ry="8" fill="#1D3557"/>
    <ellipse cx="150" cy="352" rx="22" ry="8" fill="#1D3557"/>
    <path d="M 108,240 L 100,348" stroke="#2F4A6E" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M 142,240 L 150,348" stroke="#2F4A6E" stroke-width="22" stroke-linecap="round" fill="none"/>
    <rect x="82" y="152" width="86" height="100" rx="18" fill="#2BB7A3"/>
    <!-- 왼팔(내림) -->
    <path d="M 86,168 L 64,226" stroke="#F0C49B" stroke-width="16" stroke-linecap="round" fill="none"/>
    <circle cx="62" cy="230" r="11" fill="#F0C49B"/>
    <!-- 오른팔: 주먹 번쩍 (활기) -->
    <path d="M 162,164 L 188,98" stroke="#F0C49B" stroke-width="16" stroke-linecap="round" fill="none"/>
    <circle cx="192" cy="88" r="14" fill="#F0C49B"/>
    <!-- 머리(젊고 밝은 표정) -->
    <circle cx="120" cy="106" r="40" fill="#F0C49B" stroke="#D4A070" stroke-width="3"/>
    <path d="M 82,102 A 40 40 0 0 1 158,102 L 158,92 Q 140,74 120,76 Q 100,74 82,92 Z" fill="#2D2018"/>
    <circle cx="106" cy="108" r="5" fill="#2D3047"/>
    <circle cx="134" cy="108" r="5" fill="#2D3047"/>
    <path d="M 104,124 Q 120,136 136,124" stroke="#2D3047" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <text x="120" y="22" text-anchor="middle" font-family="'Gowun Dodum', sans-serif" font-size="22" fill="#1A8C7A">청년</text>
  </g>

  <!-- hit 8: 서쪽 표지 L3 translate(960,480) pad 240x360 -->
  <g data-hit="8" transform="translate(960,480)">
    <rect class="hit-pad" x="0" y="0" width="240" height="360" fill="transparent"/>
    <rect x="108" y="148" width="20" height="210" fill="#8A8A8A"/>
    <ellipse cx="118" cy="356" rx="40" ry="10" fill="#6A6A6A"/>
    <polygon points="8,28 172,28 222,88 172,148 8,148" fill="#FFD166" stroke="#B98B12" stroke-width="5"/>
    <text x="96" y="100" text-anchor="middle" font-family="'Jua', sans-serif" font-size="40" fill="#2D3047">서쪽</text>
    <polygon points="230,88 206,68 206,108" fill="#2D3047"/>
  </g>

  <!-- hit 9: 동쪽 표지 L4 translate(1250,480) pad 300x360 -->
  <g data-hit="9" transform="translate(1250,480)">
    <rect class="hit-pad" x="0" y="0" width="300" height="360" fill="transparent"/>
    <rect x="140" y="148" width="20" height="210" fill="#8A8A8A"/>
    <ellipse cx="150" cy="356" rx="40" ry="10" fill="#6A6A6A"/>
    <polygon points="292,28 128,28 78,88 128,148 292,148" fill="#FFD166" stroke="#B98B12" stroke-width="5"/>
    <text x="200" y="100" text-anchor="middle" font-family="'Jua', sans-serif" font-size="40" fill="#2D3047">동쪽</text>
    <polygon points="70,88 94,68 94,108" fill="#2D3047"/>
  </g>

</svg>
