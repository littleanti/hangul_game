<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" aria-label="주차장 사건 일러스트">
  <defs>
    <linearGradient id="pk-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#8FCBEE"/>
      <stop offset="0.6" stop-color="#BFE0F2"/>
      <stop offset="1"   stop-color="#E8F4FB"/>
    </linearGradient>
    <linearGradient id="pk-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9AA0A8"/>
      <stop offset="1" stop-color="#6E747C"/>
    </linearGradient>
    <linearGradient id="pk-road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A3E46"/>
      <stop offset="1" stop-color="#2A2D34"/>
    </linearGradient>
  </defs>

  <!-- ═══ 배경 레이어 ═══════════════════════════════════════════ -->
  <!-- 하늘 -->
  <rect x="0" y="0" width="1600" height="470" fill="url(#pk-sky)"/>
  <!-- 해 -->
  <circle cx="1430" cy="100" r="50" fill="#FFE08A" opacity="0.95"/>
  <circle cx="1430" cy="100" r="72" fill="#FFE08A" opacity="0.22"/>
  <!-- 구름 -->
  <g fill="#ffffff" opacity="0.9">
    <ellipse cx="250" cy="96"  rx="74" ry="24"/>
    <ellipse cx="306" cy="84"  rx="52" ry="20"/>
    <ellipse cx="760" cy="74"  rx="84" ry="26"/>
    <ellipse cx="822" cy="64"  rx="54" ry="20"/>
  </g>

  <!-- 배경 건물(주차 빌딩) -->
  <g>
    <rect x="40"   y="200" width="320" height="248" fill="#C8CDD6"/>
    <rect x="40"   y="200" width="320" height="36"  fill="#AAB0BB"/>
    <g fill="#7E93AB">
      <rect x="72"  y="258" width="58" height="40"/>
      <rect x="150" y="258" width="58" height="40"/>
      <rect x="228" y="258" width="58" height="40"/>
      <rect x="72"  y="322" width="58" height="40"/>
      <rect x="150" y="322" width="58" height="40"/>
      <rect x="228" y="322" width="58" height="40"/>
    </g>
    <rect x="1240" y="190" width="320" height="258" fill="#D2D7DF"/>
    <rect x="1240" y="190" width="320" height="36"  fill="#B4BAC4"/>
    <g fill="#7E93AB">
      <rect x="1272" y="248" width="54" height="40"/>
      <rect x="1348" y="248" width="54" height="40"/>
      <rect x="1424" y="248" width="54" height="40"/>
      <rect x="1500" y="248" width="40" height="40"/>
      <rect x="1272" y="312" width="54" height="40"/>
      <rect x="1348" y="312" width="54" height="40"/>
      <rect x="1424" y="312" width="54" height="40"/>
    </g>
  </g>

  <!-- 인도/연석(표지판 기둥이 박히는 띠) -->
  <rect x="0" y="448" width="1600" height="24" fill="#B7BcC4"/>

  <!-- 주차장 바닥 -->
  <rect x="0" y="472" width="1600" height="428" fill="url(#pk-ground)"/>

  <!-- 도로/차도(상단 가로 띠) -->
  <rect x="0" y="472" width="1600" height="96" fill="url(#pk-road)"/>

  <!-- 주차 구획선(바닥) -->
  <g stroke="#F4F4F0" stroke-width="6" opacity="0.85">
    <line x1="120"  y1="600" x2="120"  y2="884"/>
    <line x1="370"  y1="600" x2="370"  y2="884"/>
    <line x1="620"  y1="600" x2="620"  y2="884"/>
    <line x1="980"  y1="600" x2="980"  y2="884"/>
    <line x1="1230" y1="600" x2="1230" y2="884"/>
    <line x1="1480" y1="600" x2="1480" y2="884"/>
    <line x1="40"   y1="600" x2="1560" y2="600"/>
  </g>

  <!-- ═══ 클릭 아이템 (data-hit 0~9) ═══════════════════════════════
       index 순서는 src/data/stages.js parking-lot entries 와 1:1.
       ★ 겹침 금지: 각 그룹의 getBBox(=히트존)가 서로 겹치지 않도록 배치.
           · 상단 밴드(표지판): y 280–462
           · 중단 밴드(도로 차선): y 476–560
           · 하단 밴드(주차 구획: 차량·콘·자전거·사람): y 560–840
         같은 밴드 안에서는 x 간격(≥40)을 확보한다.
       모든 아트는 그룹의 .hit-pad(투명 사각형) 안에 들어가도록 그려
       그룹 getBBox 가 정확히 hit-pad 와 일치하게 한다. -->

  <!-- ── 상단 밴드: 표지판 5종 (y 280–462) ───────────────────────── -->

  <!-- 1 — 주차장 P 표지판 (場): 입구 표지 / box x80–280 -->
  <g data-hit="1" transform="translate(80,280)">
    <rect class="hit-pad" x="0" y="0" width="200" height="182" fill="transparent"/>
    <rect x="90" y="128" width="20" height="54" fill="#8A8A8A"/>
    <rect x="35" y="8" width="130" height="128" rx="12" fill="#1B5FA3" stroke="#0E3C6B" stroke-width="5"/>
    <text x="100" y="112" text-anchor="middle" font-family="'Jua', sans-serif" font-size="96" fill="#ffffff">P</text>
  </g>

  <!-- 5 — 국립공원 안내 (立): 안내판 / box x380–580 -->
  <g data-hit="5" transform="translate(380,280)">
    <rect class="hit-pad" x="0" y="0" width="200" height="182" fill="transparent"/>
    <rect x="91" y="128" width="18" height="54" fill="#7A5B3A"/>
    <rect x="20" y="10" width="160" height="120" rx="12" fill="#3F7D54" stroke="#235A38" stroke-width="5"/>
    <text x="100" y="72"  text-anchor="middle" font-family="'Jua', sans-serif" font-size="42" fill="#ffffff">국립</text>
    <text x="100" y="112" text-anchor="middle" font-family="'Gowun Dodum', sans-serif" font-size="26" fill="#ffffff">공원</text>
  </g>

  <!-- 8 — 안전 표지 (全): 삼각 경고 / box x680–840 -->
  <g data-hit="8" transform="translate(680,280)">
    <rect class="hit-pad" x="0" y="0" width="160" height="182" fill="transparent"/>
    <rect x="72" y="130" width="16" height="52" fill="#8A8A8A"/>
    <polygon points="80,12 150,134 10,134" fill="#FFD166" stroke="#B98B12" stroke-width="6"/>
    <rect x="73" y="48" width="14" height="50" rx="4" fill="#2D3047"/>
    <circle cx="80" cy="116" r="8" fill="#2D3047"/>
  </g>

  <!-- 6 — 방향 안내판 (方): 화살표 표지 / box x940–1140 -->
  <g data-hit="6" transform="translate(940,280)">
    <rect class="hit-pad" x="0" y="0" width="200" height="182" fill="transparent"/>
    <rect x="92" y="128" width="18" height="54" fill="#8A8A8A"/>
    <polygon points="10,34 140,34 185,84 140,134 10,134" fill="#FFD166" stroke="#B98B12" stroke-width="5"/>
    <text x="76" y="98" text-anchor="middle" font-family="'Jua', sans-serif" font-size="46" fill="#2D3047">방향</text>
  </g>

  <!-- 4 — 전기차 충전기 (力): 우측 빌딩 벽면 / box x1290–1450 -->
  <g data-hit="4" transform="translate(1290,280)">
    <rect class="hit-pad" x="0" y="0" width="160" height="182" fill="transparent"/>
    <rect x="36" y="6" width="92" height="172" rx="14" fill="#39B7A0" stroke="#1F6E60" stroke-width="5"/>
    <rect x="50" y="24" width="64" height="40" rx="6" fill="#13343B"/>
    <text x="82" y="54" text-anchor="middle" font-family="'Jua', sans-serif" font-size="26" fill="#FFD166">EV</text>
    <path d="M 78,86 L 64,124 L 90,124 L 76,164" stroke="#FFD166" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ── 중단 밴드: 도로 차선 (y 476–560) ────────────────────────── -->

  <!-- 2 — 차도 표시 (道): 상단 도로 위 차선 + 방향 표시 / box x120–380 -->
  <g data-hit="2" transform="translate(120,476)">
    <rect class="hit-pad" x="0" y="0" width="260" height="84" fill="transparent"/>
    <g fill="#FFD166">
      <rect x="20"  y="40" width="50" height="12"/>
      <rect x="105" y="40" width="50" height="12"/>
      <rect x="190" y="40" width="50" height="12"/>
    </g>
    <polygon points="130,8 162,8 146,30 178,30 120,76 138,46 108,46" fill="#ffffff"/>
  </g>

  <!-- ── 하단 밴드: 주차 구획 (차량·콘·사람·자전거) ───────────────── -->

  <!-- 0 — 자동차 (車): 첫 주차 구획 / box x130–360 -->
  <g data-hit="0" transform="translate(130,620)">
    <rect class="hit-pad" x="0" y="0" width="230" height="200" fill="transparent"/>
    <rect x="10" y="92"  width="200" height="62" rx="16" fill="#E63946"/>
    <rect x="48" y="48"  width="120" height="52" rx="16" fill="#E63946"/>
    <rect x="62" y="58"  width="44"  height="30" fill="#BFE7EA"/>
    <rect x="116" y="58" width="44"  height="30" fill="#BFE7EA"/>
    <circle cx="58"  cy="156" r="26" fill="#1D3557"/>
    <circle cx="58"  cy="156" r="10" fill="#A8DADC"/>
    <circle cx="166" cy="156" r="26" fill="#1D3557"/>
    <circle cx="166" cy="156" r="10" fill="#A8DADC"/>
  </g>

  <!-- 9 — 공사 표시 (工): 둘째 구획 공사 콘 / box x430–620 -->
  <g data-hit="9" transform="translate(430,640)">
    <rect class="hit-pad" x="0" y="0" width="190" height="180" fill="transparent"/>
    <polygon points="95,18 38,150 152,150" fill="#FF8C00" stroke="#C56A00" stroke-width="5"/>
    <rect x="58" y="66"  width="74" height="14" fill="#ffffff"/>
    <rect x="50" y="104" width="90" height="14" fill="#ffffff"/>
    <rect x="20" y="148" width="150" height="16" fill="#2D3047"/>
  </g>

  <!-- 3 — 운동하는 사람 (動): 빈 주차 구획에서 달리는 사람 / box x700–860 -->
  <g data-hit="3" transform="translate(700,560)">
    <rect class="hit-pad" x="0" y="0" width="160" height="260" fill="transparent"/>
    <!-- 뒷다리(차내는 다리) -->
    <path d="M 74,148 L 46,192 L 24,222" fill="none" stroke="#3A567A" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="22" cy="226" rx="16" ry="9" fill="#2D3047"/>
    <!-- 뒷팔(뒤로 스윙) -->
    <path d="M 80,90 L 56,104 L 46,130" fill="none" stroke="#F0C49B" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 몸통(앞으로 기운 티셔츠) -->
    <rect x="58" y="76" width="50" height="82" rx="24" fill="#4C9BE0" transform="rotate(10 84 117)"/>
    <!-- 앞다리(무릎 올림) -->
    <path d="M 84,150 L 114,176 L 108,214" fill="none" stroke="#2F4A6E" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="110" cy="218" rx="16" ry="9" fill="#2D3047"/>
    <!-- 앞팔(앞으로 들어올림) -->
    <path d="M 92,88 L 120,90 L 120,64" fill="none" stroke="#F0C49B" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 머리(진행 방향으로 기울임) -->
    <circle cx="98" cy="48" r="26" fill="#F0C49B"/>
    <path d="M 74,42 A 26 26 0 0 1 122,42 L 122,38 A 26 26 0 0 0 74,38 Z" fill="#3A2A1A"/>
    <circle cx="106" cy="48" r="3.5" fill="#2D3047"/>
    <path d="M 100,62 Q 108,68 116,60" stroke="#2D3047" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 7 — 자전거 (自): 우측 구획 자전거 거치대 / box x1240–1480 -->
  <g data-hit="7" transform="translate(1240,620)">
    <rect class="hit-pad" x="0" y="0" width="240" height="200" fill="transparent"/>
    <rect x="6" y="168" width="210" height="10" fill="#5A5F68"/>
    <circle cx="56"  cy="132" r="42" fill="none" stroke="#1D3557" stroke-width="8"/>
    <circle cx="172" cy="132" r="42" fill="none" stroke="#1D3557" stroke-width="8"/>
    <line x1="56"  y1="132" x2="114" y2="68"  stroke="#1D3557" stroke-width="8"/>
    <line x1="172" y1="132" x2="114" y2="68"  stroke="#1D3557" stroke-width="8"/>
    <line x1="56"  y1="132" x2="172" y2="132" stroke="#1D3557" stroke-width="8"/>
    <line x1="114" y1="68"  x2="150" y2="48"  stroke="#1D3557" stroke-width="8"/>
    <line x1="56"  y1="132" x2="90"  y2="48"  stroke="#1D3557" stroke-width="8"/>
    <rect x="80" y="38" width="24" height="14" fill="#1D3557"/>
  </g>
</svg>
