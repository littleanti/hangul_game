<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="유아부터 중학생까지, 단계별 한글·어휘·문해력 학습 게임 모음. 초성퀴즈부터 사자성어 크로스워드까지 12단계 학습 로드맵." />
  <meta name="theme-color" content="#FF7757" />
  <title>한글 게임 | 단계별 한글·어휘·문해력 학습</title>

  <!-- Open Graph -->
  <meta property="og:title" content="한글 게임 — 단계별 학습 로드맵" />
  <meta property="og:description" content="유아부터 중학생까지, 12단계로 즐기는 한글·어휘·문해력 게임 모음." />
  <meta property="og:type" content="website" />

  <!-- Google Fonts: Jua(제목) + Gowun Dodum(본문) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet" />

  <!-- 인라인 SVG 파비콘 (별도 파일 불필요) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23FF7757'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle' fill='%23FFF6E4' font-family='sans-serif'%3E%ED%95%9C%3C/text%3E%3C/svg%3E" />

  <style>
    :root {
      --coral: #FF7757;
      --navy: #2D3047;
      --cream: #FFF6E4;
      --mint: #6BCAB8;
      --yellow: #FFD166;
      --card-bg: #FFFFFF;
      --shadow: 0 8px 24px rgba(45, 48, 71, 0.12);
      --shadow-hover: 0 14px 32px rgba(45, 48, 71, 0.20);
      --radius: 24px;
      --radius-btn: 999px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Gowun Dodum', system-ui, -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background-color: var(--cream);
      background-image:
        radial-gradient(circle at 12% 18%, rgba(107, 202, 184, 0.18), transparent 42%),
        radial-gradient(circle at 88% 12%, rgba(255, 209, 102, 0.22), transparent 40%),
        radial-gradient(circle at 78% 92%, rgba(255, 119, 87, 0.14), transparent 45%);
      color: var(--navy);
      min-height: 100vh;
      line-height: 1.6;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .wrap {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    /* ===== Header ===== */
    header { text-align: center; margin-bottom: 12px; }

    .badge {
      display: inline-block;
      font-family: 'Jua', sans-serif;
      background: var(--mint);
      color: #fff;
      padding: 6px 18px;
      border-radius: var(--radius-btn);
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Jua', sans-serif;
      font-size: clamp(2.1rem, 7vw, 3.4rem);
      color: var(--navy);
      line-height: 1.2;
      margin-bottom: 14px;
    }

    h1 .accent { color: var(--coral); }

    .subtitle {
      font-size: clamp(1rem, 3.6vw, 1.2rem);
      color: #5b5f78;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ===== Roadmap progress strip ===== */
    .roadmap {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      margin: 28px auto 40px;
      max-width: 640px;
    }

    .roadmap .dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-family: 'Jua', sans-serif;
      font-size: 0.95rem;
      color: #fff;
      background: var(--coral);
      box-shadow: var(--shadow);
      flex: 0 0 auto;
    }

    .roadmap .line {
      width: 18px;
      height: 4px;
      border-radius: 2px;
      background: rgba(45, 48, 71, 0.18);
      flex: 0 0 auto;
    }

    /* ===== Card grid ===== */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    @media (min-width: 560px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
    }
    @media (min-width: 880px) {
      .grid { grid-template-columns: repeat(3, 1fr); gap: 22px; }
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px 22px 22px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      border: 3px solid transparent;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: var(--accent, var(--coral));
    }

    .card:hover, .card:focus-within {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent, var(--coral));
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .stage-num {
      flex: 0 0 auto;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-family: 'Jua', sans-serif;
      font-size: 1.5rem;
      color: #fff;
      background: var(--accent, var(--coral));
    }

    .age-tag {
      font-family: 'Jua', sans-serif;
      font-size: 0.82rem;
      color: var(--navy);
      background: var(--yellow);
      padding: 5px 12px;
      border-radius: var(--radius-btn);
      white-space: nowrap;
    }

    .card h2 {
      font-family: 'Jua', sans-serif;
      font-size: 1.35rem;
      color: var(--navy);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .card p {
      font-size: 0.97rem;
      color: #5b5f78;
      margin-bottom: 20px;
      flex: 1 1 auto;
    }

    .play-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Jua', sans-serif;
      font-size: 1.1rem;
      text-decoration: none;
      color: #fff;
      background: var(--accent, var(--coral));
      padding: 14px 20px;
      border-radius: var(--radius-btn);
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.12);
      transition: transform 0.12s ease, filter 0.12s ease, box-shadow 0.12s ease;
      width: 100%;
    }

    .play-btn:hover { filter: brightness(1.05); }

    .play-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.12);
    }

    .play-btn .arrow { font-size: 1.15rem; line-height: 1; }

    /* ===== Footer ===== */
    footer {
      text-align: center;
      margin-top: 48px;
      color: #8a8da4;
      font-size: 0.88rem;
    }

    footer .heart { color: var(--coral); }

    /* Accessibility: keyboard focus ring */
    .play-btn:focus-visible {
      outline: 3px solid var(--navy);
      outline-offset: 3px;
    }

    @media (prefers-reduced-motion: reduce) {
      .card, .play-btn { transition: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="badge">한글 학습 게임 시리즈</span>
      <h1>한글 게임 <span class="accent">놀이터</span></h1>
      <p class="subtitle">유아부터 중학생까지, 12단계로 차근차근 키우는 한글·어휘·문해력. 원하는 단계의 게임을 골라 바로 시작하세요!</p>
      <nav class="roadmap" id="roadmap" aria-label="학습 로드맵 12단계"></nav>
    </header>

    <main class="grid" id="grid" aria-label="게임 목록"></main>

    <footer>
      <p>아이의 한글 성장 단계에 맞춰 만든 무료 학습 게임 <span class="heart">&hearts;</span></p>
    </footer>
  </div>

  <script>
    // 배포 서브패스(부모 GitHub Pages) 기준 경로
    var BASE = "/hangul_game/";

    var GAMES = [
      {
        stage: 1,
        slug: "1_chosung_quiz",
        title: "초성 퀴즈",
        desc: "초성 힌트를 보고 단어를 맞혀요. 한글과 친해지는 첫걸음!",
        age: "유아~초저",
        color: "#FF7757"
      },
      {
        stage: 2,
        slug: "2_vowel_finder",
        title: "모음 찾기",
        desc: "모음을 찾고 같은 모음끼리 모아요. 음절 조립 준비 워밍업!",
        age: "만 4~6세",
        color: "#6BCAB8"
      },
      {
        stage: 3,
        slug: "3_syllable_assembly",
        title: "음절 조립",
        desc: "자음과 모음을 모아 글자를 만들어요. 받침까지 척척!",
        age: "만 4~6세",
        color: "#FFD166"
      },
      {
        stage: 4,
        slug: "4_word_network",
        title: "어휘망",
        desc: "관련된 낱말을 이어 어휘 그물을 넓혀가요.",
        age: "만 5~7세",
        color: "#FF7757"
      },
      {
        stage: 5,
        slug: "5_compound_split",
        title: "합성어 쪼개기",
        desc: "친숙한 낱말을 쪼개 뜻조각을 발견해요. 형태소의 첫 발견!",
        age: "만 6~7세",
        color: "#6BCAB8"
      },
      {
        stage: 6,
        slug: "6_morpheme_detective",
        title: "형태소 탐정",
        desc: "낱말을 쪼개 숨은 뜻조각을 찾는 탐정 놀이!",
        age: "초 1~2",
        color: "#FFD166"
      },
      {
        stage: 7,
        slug: "7_reverse_root",
        title: "한자 뿌리 역분해",
        desc: "한자어를 거꾸로 쪼개 뿌리 글자를 찾아요.",
        age: "만 8세",
        color: "#FF7757"
      },
      {
        stage: 8,
        slug: "8_vocabulary_tree",
        title: "어휘 세계수",
        desc: "낱말 나무를 키우며 풍부한 어휘를 쌓아요.",
        age: "초 3~4",
        color: "#6BCAB8"
      },
      {
        stage: 9,
        slug: "9_sentence_clue_garden",
        title: "문장 단서 정원",
        desc: "문장 속 단서로 알맞은 낱말을 채워요. 문맥 추론 첫걸음!",
        age: "초 4~5",
        color: "#FFD166"
      },
      {
        stage: 10,
        slug: "10_literacy_decoder",
        title: "문해력 해독기",
        desc: "긴 글 속 핵심을 읽어내는 문해력 훈련소.",
        age: "초 5~6",
        color: "#FF7757"
      },
      {
        stage: 11,
        slug: "11_idiom_syllable_typer",
        title: "사자성어 받아쓰기",
        desc: "사자성어를 한 음절씩 적어요. 자유 타자 준비 단계!",
        age: "초 6~중1",
        color: "#6BCAB8"
      },
      {
        stage: 12,
        slug: "12_four-character_idiom_crossword",
        title: "사자성어 크로스워드",
        desc: "사자성어로 채우는 십자말풀이. 어휘력의 끝판왕!",
        age: "초고~중1",
        color: "#FFD166"
      }
    ];

    // ===== 카드 그리드 렌더링 =====
    (function renderGrid() {
      var grid = document.getElementById("grid");
      var frag = document.createDocumentFragment();

      GAMES.forEach(function (g) {
        var href = BASE + g.slug + "/";

        var card = document.createElement("article");
        card.className = "card";
        card.style.setProperty("--accent", g.color);

        var top = document.createElement("div");
        top.className = "card-top";

        var num = document.createElement("span");
        num.className = "stage-num";
        num.textContent = g.stage;
        num.setAttribute("aria-hidden", "true");

        var age = document.createElement("span");
        age.className = "age-tag";
        age.textContent = g.age;

        top.appendChild(num);
        top.appendChild(age);

        var h2 = document.createElement("h2");
        h2.textContent = g.stage + "단계 · " + g.title;

        var p = document.createElement("p");
        p.textContent = g.desc;

        var btn;
        if (g.ready === false) {
          btn = document.createElement("span");
          btn.className = "play-btn soon";
          btn.setAttribute("aria-disabled", "true");
          btn.style.background = "#d7dbe3";
          btn.style.color = "#7b8190";
          btn.style.cursor = "default";
          btn.style.boxShadow = "none";
          btn.innerHTML = '<span>준비 중</span>';
        } else {
          btn = document.createElement("a");
          btn.className = "play-btn";
          btn.href = href;
          btn.setAttribute("aria-label", g.title + " 실행하기");
          btn.innerHTML = '<span>실행</span><span class="arrow" aria-hidden="true">&rarr;</span>';
        }

        card.appendChild(top);
        card.appendChild(h2);
        card.appendChild(p);
        card.appendChild(btn);
        frag.appendChild(card);
      });

      grid.appendChild(frag);
    })();

    // ===== 로드맵 진행 표시 렌더링 =====
    (function renderRoadmap() {
      var nav = document.getElementById("roadmap");
      var frag = document.createDocumentFragment();

      GAMES.forEach(function (g, i) {
        if (i > 0) {
          var line = document.createElement("span");
          line.className = "line";
          frag.appendChild(line);
        }
        var dot = document.createElement("span");
        dot.className = "dot";
        dot.style.background = g.color;
        dot.textContent = g.stage;
        dot.title = g.title + " (" + g.age + ")";
        frag.appendChild(dot);
      });

      nav.appendChild(frag);
    })();
  </script>
</body>
</html>
